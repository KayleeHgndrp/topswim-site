<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Topswim — Open Water Coaching Amsterdam</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --ink:#0a1f3d;
    --ink-2:#13345e;
    --paper:#ffffff;
    --paper-2:#f5f3ee;
    --line:#0a1f3d;
    --accent:#0a1f3d;
    --accent-2:#c9a96e;
    --water:#0a1f3d;
    --muted:rgba(10,31,61,.55);
    --hairline:rgba(10,31,61,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",ui-sans-serif,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  body.dark{
    --ink:#f4ede0;--ink-2:#ebe2d0;--paper:#0b1c2c;--paper-2:#0e2336;
    --line:#f4ede0;--hairline:rgba(244,237,224,.22);--muted:rgba(244,237,224,.62);
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-feature-settings:"ss01","cv02";letter-spacing:.01em}
  .serif{font-family:"Fraunces",ui-serif,Georgia,serif;font-variation-settings:"opsz" 144,"SOFT" 30;letter-spacing:-.02em}
  .uc{text-transform:uppercase;letter-spacing:.14em}
  ::selection{background:var(--ink);color:#fff}
  .serif{font-weight:300}

  /* layout */
  .shell{max-width:1440px;margin:0 auto;padding:0 28px;position:relative}
  @media(max-width:760px){.shell{padding:0 18px}}
  .row{display:flex}.col{display:flex;flex-direction:column}
  .hairline{border-top:1px solid var(--hairline)}
  .hairline-b{border-bottom:1px solid var(--hairline)}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1px solid var(--hairline)}
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.02em}
  .brand-mark{width:28px;height:28px;border-radius:50%;background:var(--ink);position:relative;flex:none;overflow:hidden}
  .brand-mark::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent 0 4px,rgba(255,255,255,.18) 4px 5px)}
  .brand-mark::after{content:"";position:absolute;inset:7px;border-radius:50%;background:#fff}
  .brand-name{font-size:18px}
  .nav{display:flex;align-items:center;gap:22px}
  .nav a{color:var(--ink);text-decoration:none;font-size:13px;letter-spacing:.02em}
  .nav a:hover{color:var(--accent)}
  .lang{display:inline-flex;align-items:center;border:1px solid var(--hairline);border-radius:999px;padding:2px;font-size:11px}
  .lang button{background:transparent;border:0;color:var(--ink);padding:4px 10px;border-radius:999px;cursor:pointer;font:inherit}
  .lang button.on{background:var(--ink);color:var(--paper)}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:2px;border:1px solid var(--ink);
    background:var(--ink);color:#fff;text-decoration:none;font:500 12px/1 "Inter",sans-serif;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:transform .15s ease,background .15s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.accent{background:var(--ink);border-color:var(--ink);color:#fff}
  .btn.accent:hover{background:#13345e}
  .btn.light{background:#fff;color:var(--ink);border-color:#fff}
  .btn.light:hover{background:#f5f3ee}
  .btn .arr{display:inline-block;transition:transform .2s ease}
  .btn:hover .arr{transform:translateX(3px)}

  /* eyebrow row */
  .meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--muted)}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--ink);opacity:.45}

  /* photo placeholders */
  .photo{position:relative;background:var(--ink);overflow:hidden;border-radius:6px;color:var(--paper)}
  .photo .ph-grad{position:absolute;inset:0;
    background:
      radial-gradient(120% 80% at 30% 10%,rgba(255,255,255,.22),transparent 60%),
      radial-gradient(140% 100% at 80% 100%,rgba(10,31,61,.6),transparent 55%),
      linear-gradient(180deg,#0a1f3d 0%,#13345e 60%,#2a5a8a 100%);}
  .photo .ph-grain{position:absolute;inset:0;opacity:.18;mix-blend-mode:overlay;
    background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 1px,transparent 1px 3px),
      repeating-linear-gradient(90deg,rgba(0,0,0,.06) 0 1px,transparent 1px 3px)}
  .photo .ph-water{position:absolute;inset:auto 0 0 0;height:55%;
    background:repeating-linear-gradient(transparent 0 8px,rgba(244,237,224,.06) 8px 9px);
    mask:linear-gradient(180deg,transparent,#000 30%);
    transform-origin:bottom;animation:wave 14s linear infinite}
  @keyframes wave{0%{transform:translateY(0)}50%{transform:translateY(-2px)}100%{transform:translateY(0)}}
  .ph-tag{position:absolute;display:flex;gap:6px;align-items:center;font:500 10px/1 "JetBrains Mono",monospace;
    letter-spacing:.06em;text-transform:uppercase;color:var(--paper);
    background:rgba(11,28,44,.55);backdrop-filter:blur(6px);padding:6px 9px;border-radius:4px;border:1px solid rgba(244,237,224,.25)}
  .ph-tag .blink{width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.6);animation:blink 1.6s ease-in-out infinite}
  @keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}50%{box-shadow:0 0 0 6px rgba(255,255,255,0)}}

  /* card */
  .card{background:var(--paper-2);border-radius:2px;padding:24px}
  body.dark .card{background:#102a3f}

  /* typography helpers */
  .display{font-family:"Fraunces",serif;font-variation-settings:"opsz" 144;font-weight:400;line-height:.92;letter-spacing:-.035em}
  h1.display{font-size:clamp(56px,9vw,148px);margin:0}
  h2.display{font-size:clamp(40px,5.5vw,84px);margin:0;line-height:.94}
  h3.display{font-size:clamp(26px,3vw,40px);margin:0;line-height:1}

  /* signup modal */
  .modal-back{position:fixed;inset:0;background:rgba(11,28,44,.55);backdrop-filter:blur(6px);z-index:80;display:flex;align-items:flex-end;justify-content:center;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media(min-width:760px){.modal-back{align-items:center}}
  .modal{background:var(--paper);width:100%;max-width:780px;max-height:92vh;overflow:hidden;border-radius:4px 4px 0 0;display:flex;flex-direction:column;animation:slide .35s cubic-bezier(.2,.8,.2,1)}
  @media(min-width:760px){.modal{border-radius:4px}}
  @keyframes slide{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}

  .input,.select{width:100%;background:transparent;border:0;border-bottom:1px solid var(--hairline);padding:14px 0 12px;font:500 17px/1.2 "Inter",sans-serif;color:var(--ink);outline:none}
  .input:focus,.select:focus{border-color:var(--accent)}
  .input::placeholder{color:var(--muted)}
  label.fl{font:500 11px/1 "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}

  /* radio cards */
  .opt{border:1px solid var(--hairline);border-radius:2px;padding:18px;cursor:pointer;transition:all .15s ease;background:transparent;text-align:left;width:100%;color:var(--ink);display:flex;gap:14px;align-items:flex-start;font:inherit}
  .opt:hover{border-color:var(--ink)}
  .opt.on{border-color:var(--ink);background:rgba(10,31,61,.04);box-shadow:0 0 0 3px rgba(10,31,61,.08)}
  .opt-bullet{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--ink);flex:none;margin-top:3px;display:grid;place-items:center}
  .opt.on .opt-bullet::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--ink)}

  /* pill */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--hairline);font:500 11px/1 "JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
  .pill.solid{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .pill.accent{background:var(--accent-2);color:var(--ink);border-color:var(--accent-2)}

  /* marquee */
  .marquee{overflow:hidden;background:var(--ink);color:#fff}
  .marquee-track{display:flex;gap:36px;padding:18px 0;white-space:nowrap;animation:scroll 50s linear infinite;font-family:"Fraunces",serif;font-size:22px;font-weight:300;font-style:italic;letter-spacing:-.01em}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .marquee-track span{display:inline-flex;align-items:center;gap:18px}
  .marquee-track .star{color:var(--accent-2);font-style:normal;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em}

  /* schedule grid */
  .day-card{background:var(--paper-2);border-radius:2px;overflow:hidden;display:flex;flex-direction:column;min-height:380px;position:relative}
  body.dark .day-card{background:#0e2336}

  /* misc */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:32px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px}
  @media(max-width:880px){.grid-2,.grid-3{grid-template-columns:1fr}}

  .underline-link{color:var(--ink);text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:1px}
  .underline-link:hover{color:var(--accent)}

  details summary{list-style:none;cursor:pointer}
  details summary::-webkit-details-marker{display:none}

  /* hero variants */
  .hero{position:relative;min-height:88vh}
  .hero-marquee-words{font-family:"Fraunces",serif;font-size:clamp(80px,14vw,220px);line-height:.9;font-weight:300;letter-spacing:-.04em;font-variation-settings:"opsz" 144}

  /* RESPONSIVE — global */
  @media(max-width:880px){
    .topbar-inner{height:56px}
    .nav{gap:14px}
    .nav a{display:none}
    .lang{font-size:10px}
    .lang button{padding:3px 8px}
    .btn{padding:12px 16px;font-size:11px;letter-spacing:.1em}
    .btn .arr{display:none}
    .grid-2,.grid-3{grid-template-columns:1fr !important;gap:20px}
    .hero-overlay{min-height:560px;height:auto;padding-top:32px;padding-bottom:32px}
    .hero-overlay-inner{padding:80px 18px 32px !important}
    .marquee-track{font-size:16px;padding:14px 0}
    .modal{max-height:96vh}
    .modal .opt{padding:14px}
  }
  @media(max-width:560px){
    .nav .lang{display:none}
    .modal{border-radius:4px 4px 0 0 !important}
  }

  /* hero overlay variant */
  .hero-overlay{position:relative;height:88vh;min-height:640px;color:#fff;overflow:hidden;background:#06152b}
  .hero-overlay .photo{position:absolute;inset:0;height:100%;border-radius:0}
  .hero-overlay .photo .ph-grad{background:
    radial-gradient(80% 60% at 30% 20%,rgba(255,255,255,.18),transparent 60%),
    linear-gradient(180deg,rgba(6,15,30,.45) 0%,rgba(6,15,30,.15) 35%,rgba(6,15,30,.7) 100%),
    linear-gradient(180deg,#06152b 0%,#0a1f3d 50%,#1a4475 100%)}
  .hero-overlay-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:64px 28px;max-width:1440px;margin:0 auto}
  .hero-overlay h1{color:#fff}
  .hero-overlay .nav-row{position:absolute;top:24px;left:0;right:0;z-index:3}

  /* numbered grid */
  .numgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--hairline)}
  .numgrid > div{padding:32px 24px;border-bottom:1px solid var(--hairline);border-right:1px solid var(--hairline);display:flex;flex-direction:column;gap:10px;min-height:200px;background:var(--paper)}
  .numgrid > div:nth-child(3n){border-right:0}
  @media(max-width:880px){.numgrid{grid-template-columns:1fr 1fr}.numgrid > div:nth-child(3n){border-right:1px solid var(--hairline)}.numgrid > div:nth-child(2n){border-right:0}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Tweaks panel ────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRow({ label, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      {children}
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    const v0 = segAt(e.clientX);
    if (v0 !== value) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== value) onChange(v);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className="twk-seg">
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

            <a href="https://wa.me/31600000000" className="underline-link" style={{ color:"var(--paper)", fontSize:14 }}>WhatsApp · +31 6 00 000 000</a>
          </div>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:24, opacity:.6, fontSize:12, flexWrap:"wrap", gap:12 }} className="mono uc">
          <span>{f.made}</span>
          <span>{f.tag}</span>
        </div>
      </div>
    </footer>
  );
}

// ─── Signup modal ─────────────────────────────────────────────────────────────

function Row({ k, v }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", gap:16, fontSize:14 }}>
      <span className="mono uc" style={{ fontSize:11, color:"var(--muted)" }}>{k}</span>
      <span style={{ fontWeight:500, textAlign:"right" }}>{v || "—"}</span>
    </div>
  );
}

function Signup({ lang, initialSerie, initialDay, onClose }) {
  const s = T.signup[lang];
  const cc = T.courses[lang];
  const [step, setStep] = React.useState(0);
  const [data, setData] = React.useState({
    serie: initialSerie || null,
    day: initialDay || null,
    name:"", email:"", phone:"", level:s.levels[0], goals:"",
    consent:false,
  });
  const [done, setDone] = React.useState(false);

  const update = (k,v) => setData(d => ({...d, [k]:v}));
  const dayObj = data.day ? DAYS.find(d => d.key===data.day) : null;
  const price = data.serie === "hbfs" ? 225 : 185;
  const serieName = data.serie==="hbfs" ? cc.hbfsName : cc.basisName;

  const canNext = (() => {
    if (step===0) return !!data.serie;
    if (step===1) return !!data.day;
    if (step===2) return data.name && /\S+@\S+\.\S+/.test(data.email);
    return data.consent;
  })();

  const onSubmit = (e) => {
    e?.preventDefault();
    if (step < 3) { if (canNext) setStep(step+1); return; }
    if (canNext) setDone(true);
  };

  React.useEffect(() => {
    const k = (e) => { if (e.key==="Escape") onClose(); };
    window.addEventListener("keydown", k);
    return () => window.removeEventListener("keydown", k);
  }, [onClose]);

  if (done) {
    return (
      <div className="modal-back" onClick={onClose}>
        <div className="modal" onClick={e => e.stopPropagation()} style={{ padding:48, alignItems:"center", textAlign:"center" }}>
          <div style={{ width:64, height:64, borderRadius:"50%", background:"var(--accent)", display:"grid", placeItems:"center", margin:"0 auto 24px" }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M5 12l5 5 9-11" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <h2 className="display" style={{ fontSize:48, marginBottom:16 }}>{s.done}</h2>
          <p style={{ fontSize:17, lineHeight:1.5, color:"var(--muted)", maxWidth:480, margin:"0 auto 32px" }}>{s.doneSub}</p>
          <button className="btn" onClick={onClose}>{s.doneClose}</button>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div style={{ padding:"22px 28px 18px", borderBottom:"1px solid var(--hairline)", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:16, flex:1, minWidth:0 }}>
            <span className="mono uc" style={{ fontSize:11, color:"var(--muted)", flex:"none" }}>{s.step} {step+1} / {s.steps.length}</span>
            <div style={{ flex:1, height:3, background:"var(--hairline)", borderRadius:2, position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", inset:0, width:`${((step+1)/s.steps.length)*100}%`, background:"var(--accent)", transition:"width .3s ease" }} />
            </div>
          </div>
          <button onClick={onClose} aria-label={s.close} style={{ background:"none", border:0, cursor:"pointer", fontSize:18, padding:8, color:"var(--ink)" }}>✕</button>
        </div>

        <form onSubmit={onSubmit} style={{ padding:"32px 28px 28px", display:"flex", flexDirection:"column", gap:24, overflowY:"auto", flex:1 }}>
          <div>
            <h3 className="display" style={{ fontSize:36, marginBottom:6 }}>{s.steps[step].t}</h3>
            <p style={{ margin:0, color:"var(--muted)", fontSize:15 }}>{s.steps[step].s}</p>
          </div>

          {step===0 && (
            <div style={{ display:"grid", gap:12 }}>
              <button type="button" className={"opt"+(data.serie==="basis"?" on":"")} onClick={() => update("serie","basis")}>
                <span className="opt-bullet"/>
                <span style={{ flex:1 }}>
                  <span className="mono uc" style={{ fontSize:10, color:"var(--accent)" }}>{cc.basisTag}</span>
                  <span style={{ display:"block", fontSize:22, fontWeight:600, marginTop:4 }}>{cc.basisName} — €185</span>
                  <span style={{ display:"block", fontSize:13, color:"var(--muted)", marginTop:4 }}>{cc.basisLede}</span>
                </span>
              </button>
              <button type="button" className={"opt"+(data.serie==="hbfs"?" on":"")} onClick={() => update("serie","hbfs")}>
                <span className="opt-bullet"/>
                <span style={{ flex:1 }}>
                  <span className="mono uc" style={{ fontSize:10, color:"var(--accent)" }}>{cc.hbfsTag}</span>
                  <span style={{ display:"block", fontSize:22, fontWeight:600, marginTop:4 }}>{cc.hbfsName} — €225</span>
                  <span style={{ display:"block", fontSize:13, color:"var(--muted)", marginTop:4 }}>{cc.hbfsLede}</span>
                </span>
              </button>
            </div>
          )}

          {step===1 && (
            <div style={{ display:"grid", gap:10 }}>
              {DAYS.map(d => (
                <button key={d.key} type="button" className={"opt"+(data.day===d.key?" on":"")} onClick={() => update("day",d.key)}>
                  <span className="opt-bullet"/>
                  <span style={{ flex:1 }}>
                    <span className="mono uc" style={{ fontSize:10, color:"var(--accent)" }}>{(lang==="nl"?d.day_nl:d.day_en).toUpperCase()} · 19:00</span>
                    <span style={{ display:"block", fontSize:20, fontWeight:600, marginTop:4 }}>{d.spot}</span>
                    <span style={{ display:"block", fontSize:13, color:"var(--muted)", marginTop:2 }}>{d.sub} · {lang==="nl"?d.start:d.start_en}</span>
                  </span>
                </button>
              ))}
            </div>
          )}

          {step===2 && (
            <div style={{ display:"grid", gap:18 }}>
              <div>
                <label className="fl">{s.nameLbl}</label>
                <input className="input" required value={data.name} onChange={e => update("name",e.target.value)} placeholder={lang==="nl"?"Voor- en achternaam":"First and last name"} />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18 }} className="signup-grid-2">
                <div>
                  <label className="fl">{s.emailLbl}</label>
                  <input type="email" className="input" required value={data.email} onChange={e => update("email",e.target.value)} placeholder="naam@email.nl" />
                </div>
                <div>
                  <label className="fl">{s.phoneLbl}</label>
                  <input className="input" value={data.phone} onChange={e => update("phone",e.target.value)} placeholder="+31 6 …" />
                </div>
              </div>
              <div>
                <label className="fl">{s.levelLbl}</label>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8, marginTop:8 }} className="signup-levels">
                  {s.levels.map(l => (
                    <button key={l} type="button"
                      onClick={() => update("level",l)}
                      style={{ padding:"10px 14px", borderRadius:999, border:"1px solid var(--hairline)", background:data.level===l?"var(--ink)":"transparent", color:data.level===l?"var(--paper)":"var(--ink)", cursor:"pointer", font:"500 13px/1 'Inter',sans-serif" }}>{l}</button>
                  ))}
                </div>
              </div>
              <div>
                <label className="fl">{s.goalsLbl}</label>
                <textarea className="input" rows={2} value={data.goals} onChange={e => update("goals",e.target.value)} placeholder={s.goalsPh} style={{ resize:"none", paddingTop:6 }} />
              </div>
            </div>
          )}

          {step===3 && (
            <div className="card" style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <Row k={s.reviewSerie} v={`${serieName} — €${price}`} />
              {dayObj && <Row k={s.reviewDay} v={lang==="nl"?dayObj.day_nl:dayObj.day_en} />}
              {dayObj && <Row k={s.reviewLoc} v={`${dayObj.spot} · ${dayObj.sub}`} />}
              {dayObj && <Row k={s.reviewStart} v={lang==="nl"?dayObj.start:dayObj.start_en} />}
              <Row k={s.nameLbl} v={data.name} />
              <Row k={s.emailLbl} v={data.email} />
              <div style={{ display:"flex", justifyContent:"space-between", paddingTop:14, borderTop:"1px solid var(--hairline)" }}>
                <span className="mono uc" style={{ fontSize:11, color:"var(--muted)" }}>{s.total}</span>
                <span className="serif" style={{ fontSize:32, fontWeight:500, lineHeight:1, letterSpacing:"-.02em" }}>€{price}</span>
              </div>
              <label style={{ display:"flex", gap:10, alignItems:"flex-start", marginTop:8, cursor:"pointer" }}>
                <input type="checkbox" checked={data.consent} onChange={e => update("consent",e.target.checked)} style={{ marginTop:3, accentColor:"var(--accent)", width:16, height:16 }} />
                <span style={{ fontSize:13, color:"var(--muted)", lineHeight:1.4 }}>{s.consent}</span>
              </label>
            </div>
          )}
        </form>

        <div style={{ padding:"18px 28px", borderTop:"1px solid var(--hairline)", display:"flex", justifyContent:"space-between", alignItems:"center", gap:12 }}>
          <button onClick={() => setStep(Math.max(0,step-1))} disabled={step===0} className="btn ghost"
            style={{ opacity:step===0?.35:1, cursor:step===0?"default":"pointer" }}>← {s.back}</button>
          <button onClick={onSubmit} disabled={!canNext} className="btn accent"
            style={{ opacity:canNext?1:.4, cursor:canNext?"pointer":"not-allowed" }}>
            {step<3 ? s.next : s.submit} <span className="arr">→</span>
          </button>
        </div>
      </div>
      <style>{`
        @media(max-width:880px){
          .signup-grid-2{grid-template-columns:1fr !important;}
          .signup-levels{grid-template-columns:1fr !important;}
        }
      `}</style>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = { heroVariant:"overlay", palette:"midnight", lang:"nl" };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = React.useState(t.lang || "nl");
  const [signup, setSignup] = React.useState(null);

  React.useEffect(() => { applyPalette(t.palette); }, [t.palette]);

  const openSignup = (serie=null, day=null) => setSignup({ serie, day });
  const closeSignup = () => setSignup(null);

  const c = T.cta[lang];
  const navItems = T.nav[lang];

  return (
    <div>
      {/* TOPBAR */}
      <header className="topbar">
        <div className="shell topbar-inner">
          <a href="#top" className="brand" style={{ textDecoration:"none", color:"var(--ink)" }}>
            <span className="brand-mark"></span>
            <span className="brand-name">topswim<span style={{ color:"var(--accent)" }}>.</span></span>
          </a>
          <nav className="nav">
            <a href="#cursussen">{navItems[0]}</a>
            <a href="#schedule">{navItems[1]}</a>
            <a href="#coach">{navItems[2]}</a>
            <a href="#faq">{navItems[3]}</a>
            <span className="lang" role="group" aria-label="language">
              <button className={lang==="nl"?"on":""} onClick={() => setLang("nl")}>NL</button>
              <button className={lang==="en"?"on":""} onClick={() => setLang("en")}>EN</button>
            </span>
            <button className="btn accent" style={{ padding:"10px 18px" }} onClick={() => openSignup()}>{c.signup}</button>
          </nav>
        </div>
      </header>

      {/* HERO */}
      <Hero variant={t.heroVariant} lang={lang} openSignup={openSignup} />

      {/* MARQUEE */}
      <MarqueeBand lang={lang} />

      {/* COURSES */}
      <Courses lang={lang} openSignup={openSignup} />

      {/* SCHEDULE */}
      <div style={{ borderTop:"1px solid var(--hairline)" }}>
        <Schedule lang={lang} openSignup={openSignup} />
      </div>

      {/* WHO FOR */}
      <div style={{ borderTop:"1px solid var(--hairline)" }}>
        <WhoFor lang={lang} />
      </div>

      {/* WHAT YOU GET */}
      <WhatYouGet lang={lang} />

      {/* COACH */}
      <Coach lang={lang} />

      {/* TESTIMONIALS */}
      <div style={{ borderTop:"1px solid var(--hairline)" }}>
        <Testimonials lang={lang} />
      </div>

      {/* FAQ */}
      <div style={{ borderTop:"1px solid var(--hairline)" }}>
        <FAQ lang={lang} />
      </div>

      {/* FOOTER */}
      <Footer lang={lang} openSignup={openSignup} />

      {/* SIGNUP MODAL */}
      {signup && <Signup lang={lang} initialSerie={signup.serie} initialDay={signup.day} onClose={closeSignup} />}

      {/* TWEAKS */}
      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakSelect label="Variant" value={t.heroVariant}
          options={[
            { value:"overlay",   label:"Overlay (foto + titel)" },
            { value:"editorial", label:"Editorial (split + meta)" },
            { value:"marquee",   label:"Marquee (big type)" },
            { value:"split",     label:"Split (50/50)" },
          ]}
          onChange={(v) => setTweak("heroVariant", v)} />
        <TweakSection label="Palet" />
        <TweakSelect label="Kleurschema" value={t.palette}
          options={[
            { value:"midnight", label:"Midnight Water" },
            { value:"dawn",     label:"Dawn" },
            { value:"buoy",     label:"Buoy Yellow" },
          ]}
          onChange={(v) => setTweak("palette", v)} />
        <TweakSection label="Taal" />
        <TweakRadio label="Taal" value={lang}
          options={["nl","en"]}
          onChange={(v) => { setLang(v); setTweak("lang", v); }} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
